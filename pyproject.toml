[tool.pytest]
testpaths = ["tests"]

[tool.coverage.run]
source = ["tap_mysql"]

[tool.coverage.report]
show_missing = true

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "TID"]
ignore = [
    "E722",   # bare-except (was disabled in pylint as broad-except)
]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"singer.write_message".msg = "Use tap_mysql.stream_utils.write_message instead"
