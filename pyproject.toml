[tool.pytest]
testpaths = ["tests"]

[tool.coverage.run]
source = ["tap_mysql"]

[tool.coverage.report]
show_missing = true

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E722",   # bare-except (was disabled in pylint as broad-except)
]
